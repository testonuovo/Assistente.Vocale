<html>
<head>
<style>
body{
  background-color:yellow;
  }
h1{
  color:blue;
  text-align:center;
  }
p{
 color:red;
 }
button
{
background-color:red;
color:blue;
border-radius:19px;
}
</style>  
<title>Oreste AI</title>
</head>
<body>
<h1>🎤 Oreste AI</h1>
    <p>Il tuo assistente vocale online</p>

    <!-- 🎤 Voce -->
    <button onclick="startVoice()">🎤 Parla</button>

    <br><br>

    <!-- ⌨️ Testo -->
    <input type="text" id="textInput" placeholder="Scrivi un comando..." style="padding:10px; width:250px;">
    <button onclick="handleText()">Invia</button>

    <p id="output"></p>

    <script>

        // 🎤 VOCE
        function startVoice() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'it-IT';
            recognition.start();

            recognition.onresult = function(event) {
                let text = event.results[0][0].transcript.toLowerCase();
                document.getElementById("output").innerText = "Hai detto: " + text;
                handleCommand(text);
            };
        }

        // ⌨️ TESTO
        function handleText() {
            let text = document.getElementById("textInput").value.toLowerCase();
            document.getElementById("output").innerText = "Hai scritto: " + text;
            handleCommand(text);
        }

        // 🔊 VOCE
        function speak(text) {
            let speech = new SpeechSynthesisUtterance(text);
            speech.lang = "it-IT";
            window.speechSynthesis.speak(speech);
        }

        // 🌐 FUNZIONE APERTURA SITI
        function openSite(nome, url) {
            speak("Apro " + nome);
            window.open(url, "_blank");
        }

        // 🧠 COMANDI
        function handleCommand(text) {

            // 🌐 siti principali
            if (text.includes("apri google")) {
                openSite("Google", "https://www.google.com");
            }

            else if (text.includes("apri youtube")) {
                openSite("YouTube", "https://www.youtube.com");
            }

            else if (text.includes("apri canva")) {
                openSite("Canva", "https://www.canva.com");
            }

            else if (text.includes("apri github")) {
                openSite("GitHub", "https://github.com");
            }

            else if (text.includes("apri chatgpt")) {
                openSite("Chat GPT", "https://chat.openai.com");
            }

            // 🌍 qualsiasi sito
            else if (text.startsWith("apri ")) {
                let sito = text.replace("apri ", "").trim();
                let url = "https://www." + sito + ".com";
                openSite(sito, url);
            }

            // 🔍 ricerca Google
            else if (text.startsWith("cerca ")) {
                let ricerca = text.replace("cerca ", "");
                speak("Cerco " + ricerca);
                let url = "https://www.google.com/search?q=" + ricerca;
                window.open(url, "_blank");
            }

            // ⏰ orario
            else if (text.includes("che ore sono")) {
                let ora = new Date().toLocaleTimeString();
                speak("Sono le " + ora);
            }

            // 📅 data
            else if (text.includes("che giorno è")) {
                let data = new Date().toLocaleDateString();
                speak("Oggi è il " + data);
            }

            // 🧮 calcolo
            else if (text.includes("calcola")) {
                try {
                    let risultato = eval(text.replace("calcola", ""));
                    speak("Il risultato è " + risultato);
                } catch {
                    speak("Non riesco a calcolare");
                }
            }

            // 😊 saluto
            else if (text.includes("ciao")) {
                speak("Ciao! Come posso aiutarti?");
            }

            // ❌ errore
            else {
                speak("Non ho capito il comando");
            }
        }

    </script>

</body>
</html>
